<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/doacao-sanguínea.png">
    <title>Doação de Sangue</title>
</head>

<body>
    <nav>
        <h2>Cadastro para Doação de Sangue</h2>
    </nav>
    <div class="flex">
        <div id="container">
            <div id="centraliza">
               <form action="" id="formulario">
                <label for="nome">Nome Completo:</label><br>
                <input type="text" id="nome" placeholder="Nome Completo" required>
                <br>
                <br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" placeholder="Email" required>
                <br>
                <br>

                <label for="idade">Idade:</label><br>
                <input type="number" min="0" id="idade" value="0" required>
                <br>
                <br>

                <label for="peso">Peso:</label><br>
                <input type="number" min="0" id="peso" value="0" required> kg
                <br>
                <br>

                <label for="tipo-sangue">Tipo Sanguíneo:</label><br>
                <select name="tipo-sangue" id="tipo-sangue">
                    <option selected disabled value="">Escolha</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select>
                <br>
                <div id="compatibildade"></div>
                <br>

                <label for="telefone">Telefone:</label><br>
                <input type="tel" id="telefone" placeholder="(00) 00000-0000" required> 
                <br>
                <br>

                <label for="estado">Estado:</label><br>
                <input type="text" id="estado" placeholder="São Paulo" required> 
                <br>
                <br>

                <label for="cidade">Cidade:</label><br>
                <input type="text" id="cidade" placeholder="São Paulo" required> 
                <br>
                <br>

                 <div>
                <img id="tabela" src="img/tabela.jpg" alt="Tabela de Doação">
            </div>
            <div class="flex">
                    <button type="submit">Enviar</button>
                </div>
                
            </form> 
            </div>
            
            <div>
              <div id="resultado"></div>  
            </div>
           
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
